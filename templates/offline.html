<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#008080">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Money Mate">
<title>Offline — Money Mate</title>
<link rel="manifest" href="/manifest.json">
<style>
  :root { --brand: #008080; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f4f7f9;
    color: #2d3436;
    padding: 2rem;
    text-align: center;
  }
  .icon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    opacity: 0.35;
  }
  h1 { font-size: 1.6rem; font-weight: 700; margin: 0 0 0.5rem; color: var(--brand); }
  p  { font-size: 1rem; color: #636e72; margin: 0 0 2rem; max-width: 320px; }
  .btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    background: var(--brand);
    color: white;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Money Mate needs a connection to load your data. Check your internet and try again.</p>
  <button class="btn" onclick="window.location.reload()">Retry</button>
</body>
</html>
