{% extends "base.html" %}
{% block content %}

<style>
.made-by-wrap {
  max-width: 680px;
  margin: 0 auto;
}
.made-by-hero {
  background: var(--gradient-brand);
  border-radius: 24px;
  padding: 60px 40px;
  text-align: center;
  color: white;
  margin-bottom: 2rem;
  position: relative;
  overflow: hidden;
}
.made-by-hero::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  top: -100px; right: -80px;
  pointer-events: none;
}
.made-by-hero::after {
  content: '';
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  bottom: -80px; left: -60px;
  pointer-events: none;
}
.made-by-hero h1 {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
  position: relative;
  z-index: 1;
}
.made-by-hero p {
  opacity: 0.85;
  font-size: 1rem;
  position: relative;
  z-index: 1;
}
.made-by-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border-color);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(108,92,231,0.07);
  margin-bottom: 16px;
}
.made-by-card-body {
  padding: 28px 28px;
}
</style>

<div class="made-by-wrap fade-in">

  <div class="page-header mb-4">
    <a href="{{ url_for('settings') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3 mb-3">
      <i class="bi bi-arrow-left me-1"></i> Back to Settings
    </a>
    <h2 class="page-title"><i class="bi bi-stars me-2"></i>Made by</h2>
  </div>

  <div class="made-by-hero">
    <h1>Money Mate</h1>
    <p>Smart personal finance — built with care.</p>
  </div>

  <div class="made-by-card">
    <div class="made-by-card-body text-center text-muted" style="font-size:0.95rem; color: var(--text-secondary);">
      More details coming soon…
    </div>
  </div>

</div>

{% endblock %}
